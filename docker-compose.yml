version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: equilife_postgres
    environment:
      POSTGRES_DB: equilife_db
      POSTGRES_USER: horse_user
      # En production : définir DB_PASSWORD dans .env (doit correspondre au backend)
      POSTGRES_PASSWORD: ${DB_PASSWORD:-horse_password}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U horse_user" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: equilife_redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    command: redis-server --appendonly yes

  sqitch:
    image: sqitch/sqitch:latest
    container_name: equilife_sqitch
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGUSER: horse_user
      PGPASSWORD: ${DB_PASSWORD:-horse_password}
      PGHOST: postgres
      PGPORT: 5432
      PGDATABASE: equilife_db
    volumes:
      - ./migrations:/migrations
    working_dir: /migrations
    entrypoint: [ "sqitch" ]
    # Utilise DB_PASSWORD du .env (doit correspondre à postgres et backend)
    command: ["deploy", "db:pg://horse_user:${DB_PASSWORD:-horse_password}@postgres:5432/equilife_db"]

  front:
    build:
      context: ./front
      dockerfile: Dockerfile
    container_name: equilife_front
    ports:
      - "8080:80"

  api-proxy:
    image: nginx:alpine
    container_name: equilife_api_proxy
    ports:
      - "3443:443"
    volumes:
      - ./nginx/api-proxy.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/ssl:ro
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build:
      context: ./back
      dockerfile: Dockerfile
    container_name: equilife_backend
    ports:
      - "3000:3000"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: equilife_db
      DB_USER: horse_user
      # En production : définir DB_PASSWORD dans .env (obligatoire, le backend refuse "horse_password")
      DB_PASSWORD: ${DB_PASSWORD:-horse_password}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      PORT: 3000
      NODE_ENV: production
      # CORS_ORIGIN obligatoire en prod (origine du frontend, ex: https://app.equilife.com)
      CORS_ORIGIN: ${CORS_ORIGIN:-}
      # Auth désactivée par défaut. AUTH_ENABLED=true + JWT_SECRET + APP_PIN pour activer.
      AUTH_ENABLED: ${AUTH_ENABLED:-}
      JWT_SECRET: ${JWT_SECRET:-}
      APP_PIN: ${APP_PIN:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
